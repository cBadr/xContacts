services:
  app:
    build: .
    image: xcontacts:latest
    container_name: xcontacts
    restart: unless-stopped
    ports:
      - "${PORT:-5174}:5174"
    env_file: .env
    environment:
      NODE_ENV: production
      XC_DATA_DIR: /data
    volumes:
      - xcontacts_data:/data

  # Uncomment this block to add Caddy in front for automatic HTTPS.
  # Point DNS for your domain to this server and set XC_DOMAIN in .env.
  #
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - app

volumes:
  xcontacts_data:
  # caddy_data:
  # caddy_config:
